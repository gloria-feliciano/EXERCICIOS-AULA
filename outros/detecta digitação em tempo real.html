<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Projeto Vue.js Básico</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<style>
	#box { Border:solid,margim-top}
</style>
</head>
<body>
    
    <div id="app">
    
    <div id="box">
        <p><Strong>Exemplo de Interpolação</Strong></p>
        <h1>{{ mensagem }} {{nome}}</h1>
        
        <input type="text" v-model="mensagem" />
        
    </div>

    </div>
    
    
    <script>
        const app = Vue.createApp(
        {
            
            data() {
                return {
                mensagem: 'Bem-vindo ao Vue.js!'
                };
                }
            
        }
        );
        app.mount('#app');
    </script>

    
</body>
</html>
